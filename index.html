<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mohammad Teimori — improving healthcare through technology.">
  <title>Mohammad Teimori · Healthcare Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Young+Serif&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: oklch(1 0 0);
      --surface: oklch(0.985 0.012 150);
      --surface-strong: oklch(0.965 0.028 148);
      --ink: oklch(0.26 0.04 155);
      --muted: oklch(0.46 0.035 152);
      --primary: oklch(0.58 0.11 152);
      --primary-soft: oklch(0.92 0.045 150);
      --primary-ink: oklch(0.99 0.005 150);
      --border: oklch(0.9 0.022 150);
      --shadow: oklch(0.35 0.04 155 / 0.08);
      --radius-lg: 1.25rem;
      --radius-md: 0.875rem;
      --radius-pill: 999px;
      --space-1: 0.5rem;
      --space-2: 0.75rem;
      --space-3: 1rem;
      --space-4: 1.5rem;
      --space-5: 2rem;
      --space-6: 3rem;
      --font-display: "Young Serif", Georgia, serif;
      --font-body: "Manrope", system-ui, sans-serif;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.65;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% -8%, oklch(0.94 0.05 148 / 0.55), transparent 34%),
        radial-gradient(circle at 88% 0%, oklch(0.93 0.04 155 / 0.45), transparent 28%),
        var(--bg);
    }

    a {
      color: inherit;
    }

    .page {
      width: min(100% - 2rem, 52rem);
      margin: 0 auto;
      padding: clamp(2rem, 5vw, 3.5rem) 0 clamp(3rem, 6vw, 4.5rem);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: clamp(2rem, 5vw, 3rem);
    }

    .topbar a {
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      color: var(--primary);
      padding: 0.55rem 0.95rem;
      border-radius: var(--radius-pill);
      background: var(--primary-soft);
      transition: background 180ms var(--ease-out), transform 180ms var(--ease-out);
    }

    .topbar a:hover,
    .topbar a:focus-visible {
      background: oklch(0.88 0.06 150);
      transform: translateY(-1px);
      outline: none;
    }

    .hero {
      margin-bottom: clamp(2rem, 4vw, 2.75rem);
      max-width: 42rem;
      padding: clamp(1.75rem, 4vw, 2.5rem);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: linear-gradient(
        145deg,
        oklch(0.98 0.02 150) 0%,
        var(--surface) 55%,
        oklch(0.97 0.03 148) 100%
      );
      box-shadow: 0 12px 32px var(--shadow);
    }

    .hero-eyebrow {
      display: inline-block;
      margin: 0 0 var(--space-3);
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .hero h1 {
      margin: 0 0 var(--space-3);
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5.5vw, 3.35rem);
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: -0.03em;
      text-wrap: balance;
      color: oklch(0.22 0.045 154);
    }

    .hero p {
      margin: 0;
      max-width: 42ch;
      color: var(--muted);
      font-size: 1.0625rem;
      text-wrap: pretty;
    }

    .hero p a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .hero p a:hover,
    .hero p a:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    .footer {
      margin-top: clamp(2.5rem, 5vw, 3.25rem);
      padding-top: var(--space-4);
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.9375rem;
    }

    .footer p {
      margin: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .topbar a {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <span class="site-name">Mohammad Teimori</span>
      <a href="https://github.com/MohammadTeimori">GitHub profile</a>
    </header>

    <section class="hero" aria-labelledby="page-title">
      <p class="hero-eyebrow">Mohammad Teimori</p>
      <h1 id="page-title">Improve healthcare through technology</h1>
      <p>
        Clinical data, reporting, and software for better patient care.
        <a href="https://github.com/MohammadTeimori">GitHub</a>
      </p>
    </section>

    <footer class="footer">
      <p>Portfolio: <a href="https://mohammadteimori.github.io">mohammadteimori.github.io</a></p>
    </footer>
  </div>
</body>
</html>
